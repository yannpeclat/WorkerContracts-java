# ===========================================
# HR Management System - Configuration
# ===========================================
# 
# SEGURANÇA CRÍTICA:
# - TODOS os secrets DEVEM ser configurados via variáveis de ambiente
# - Valores padrão são APENAS para desenvolvimento local
# - NUNCA commitar secrets no repositório
# ===========================================

# Application Name
spring.application.name=hr-management-system

# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=${SERVER_PORT:8080}

# ===========================================
# DATABASE CONFIGURATION
# ===========================================
# Profile ativo determina qual banco usar
# dev -> H2 | prod -> PostgreSQL
# 
# SEGURANÇA: Em produção, usar variáveis de ambiente obrigatoriamente

# H2 Database (Desenvolvimento)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:hrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (apenas em dev)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ===========================================
# SPRING SECURITY - SECRETS CRÍTICOS
# ===========================================
# 
# ATENÇÃO: Estes valores DEVEM ser alterados em produção!
# Use variáveis de ambiente para configurar:
# - ADMIN_DEFAULT_PASSWORD
# - USER_DEFAULT_PASSWORD
# - JWT_SECRET
# ===========================================

# Senhas padrão dos usuários (MUDAR EM PRODUÇÃO)
admin.default.password=${ADMIN_DEFAULT_PASSWORD:}
user.default.password=${USER_DEFAULT_PASSWORD:}

# JWT Configuration
# 
# SEGURANÇA CRÍTICA:
# - JWT_SECRET deve ter MÍNIMO 32 caracteres
# - JWT_SECRET deve ser único e aleatório
# - Use: openssl rand -base64 32 para gerar
# - NUNCA usar valor padrão em produção
# ===========================================
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:hrms-api}
jwt.audience=${JWT_AUDIENCE:hrms-client}

# Rate Limiting para Login
# Previne ataques de força bruta
login.rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
login.rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}

# ===========================================
# CORS CONFIGURATION
# ===========================================
# 
# SEGURANÇA CRÍTICA:
# - Em produção, especificar origens EXPLÍCITAS
# - NUNCA usar wildcard (*) em produção
# - Exemplo: https://app.yourdomain.com
# ===========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}

# ===========================================
# LOGGING
# ===========================================
# Logs sem expor dados sensíveis (PII)
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.hrms=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===========================================
# PROFILES
# ===========================================
# Ativar profile 'prod' em produção
# Isso carrega application-prod.properties com configurações mais restritivas
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
