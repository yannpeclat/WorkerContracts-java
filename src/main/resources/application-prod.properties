# ===========================================
# HR Management System - Production Profile
# ===========================================
# 
# CONFIGURAÇÕES RESTRITIVAS PARA PRODUÇÃO
# 
# ATENÇÃO: Este profile é ativado com SPRING_PROFILES_ACTIVE=prod
# TODAS as variáveis de ambiente abaixo são OBRIGATÓRIAS em produção
# ===========================================

# ===========================================
# DATABASE CONFIGURATION - PostgreSQL
# ===========================================
# Obrigatório configurar via environment:
# - DATABASE_URL
# - DATABASE_USERNAME
# - DATABASE_PASSWORD
# ===========================================
spring.datasource.url=${DATABASE_URL:?DATABASE_URL is required in production}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DATABASE_USERNAME:?DATABASE_USERNAME is required in production}
spring.datasource.password=${DATABASE_PASSWORD:?DATABASE_PASSWORD is required in production}

# JPA/Hibernate
# 'validate' previne alterações automáticas no schema em produção
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}

# H2 Console - DESABILITADO EM PRODUÇÃO
spring.h2.console.enabled=false

# ===========================================
# JWT - OBRIGATÓRIO CONFIGURAR VIA ENVIRONMENT
# ===========================================
# A aplicação NÃO INICIA sem JWT_SECRET configurado
# Validação feita em JwtTokenProvider.init()
# ===========================================
jwt.secret=${JWT_SECRET:?JWT_SECRET is required in production. Must be at least 32 characters.}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# ===========================================
# CORS - RESTRITO EM PRODUÇÃO
# ===========================================
# Obrigatório especificar origens específicas
# Wildcard (*) NÃO É PERMITIDO em produção
# ===========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in production. No wildcards allowed.}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}

# ===========================================
# SENHAS DOS USUÁRIOS - OBRIGATÓRIO ALTERAR
# ===========================================
# Não usar senhas padrão em produção
# ===========================================
admin.default.password=${ADMIN_DEFAULT_PASSWORD:?ADMIN_DEFAULT_PASSWORD is required in production}
user.default.password=${USER_DEFAULT_PASSWORD:}

# ===========================================
# LOGGING - MAIS RESTRITIVO EM PRODUÇÃO
# ===========================================
# Evitar logs DEBUG que podem expor informações sensíveis
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.hrms=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}

# ===========================================
# RATE LIMITING - MAIS RESTRITIVO EM PRODUÇÃO
# ===========================================
login.rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:3}
login.rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
