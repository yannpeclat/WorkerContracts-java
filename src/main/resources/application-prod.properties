# ===========================================
# HR Management System - Production Profile
# ===========================================

# DATABASE CONFIGURATION - PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hrdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DATABASE_USERNAME:hrms_user}
spring.datasource.password=${DATABASE_PASSWORD:change_me_in_production}

# JPA/Hibernate - Produção usa 'validate' para não alterar schema automaticamente
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}

# H2 Console - DESABILITADO EM PRODUÇÃO
spring.h2.console.enabled=false

# JWT - OBRIGATÓRIO configurar via variáveis de ambiente em produção
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# CORS - Restringir origens específicas em produção
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# Logging mais restritivo em produção
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.hrms=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
