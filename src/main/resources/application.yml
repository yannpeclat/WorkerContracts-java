spring:
  profiles:
    active: ${SPRING_PROFILE:dev}

  application:
    name: hr-management-system

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hrms_db}
    username: ${DATABASE_USERNAME:hrms_user}
    password: ${DATABASE_PASSWORD:hrms_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-32-characters-long}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/hrms_dev
    username: hrms_dev
    password: hrms_dev_pass

  jpa:
    show-sql: true

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    com.hrms: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  security:
    enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

rate-limit:
  requests-per-minute: ${RATE_LIMIT_REQUESTS:100}