# ===========================================
# HR Management System - Configuration
# ===========================================
# 
# SEGURANÇA CRÍTICA:
# - TODOS os secrets DEVEM ser configurados via variáveis de ambiente
# - Valores padrão são APENAS para desenvolvimento local
# - NUNCA commitar secrets no repositório
# ===========================================

spring:
  application:
    name: hr-management-system
  
  # Profiles
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:hrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  
  # Flyway Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
  
  # JPA/Hibernate
  jpa:
    database-platform: ${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console (apenas em dev)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# ===========================================
# SPRING SECURITY - SECRETS CRÍTICOS
# ===========================================
# 
# ATENÇÃO: Estes valores DEVEM ser alterados em produção!
# Use variáveis de ambiente para configurar:
# - ADMIN_DEFAULT_PASSWORD
# - USER_DEFAULT_PASSWORD
# - JWT_SECRET
# ===========================================

admin:
  default:
    password: ${ADMIN_DEFAULT_PASSWORD:}

user:
  default:
    password: ${USER_DEFAULT_PASSWORD:}

# JWT Configuration
# 
# SEGURANÇA CRÍTICA:
# - JWT_SECRET deve ter MÍNIMO 32 caracteres
# - JWT_SECRET deve ser único e aleatório
# - Use: openssl rand -base64 32 para gerar
# - NUNCA usar valor padrão em produção
# ===========================================
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}
  issuer: ${JWT_ISSUER:hrms-api}
  audience: ${JWT_AUDIENCE:hrms-client}

# Rate Limiting para Login
# Previne ataques de força bruta
login:
  rate-limit:
    max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
    window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}

# ===========================================
# CORS CONFIGURATION
# ===========================================
# 
# SEGURANÇA CRÍTICA:
# - Em produção, especificar origens EXPLÍCITAS
# - NUNCA usar wildcard (*) em produção
# - Exemplo: https://app.yourdomain.com
# ===========================================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

# ===========================================
# LOGGING
# ===========================================
# Logs estruturados em JSON com Correlation ID
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.hrms: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,mappings,env,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        all: true
    enable:
      jvm: true
      http: true
      db: true

# Retry Configuration
spring:
  retry:
    enabled: true
