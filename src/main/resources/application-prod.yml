# ===========================================
# HR Management System - Production Profile
# ===========================================
# 
# CONFIGURAÇÕES RESTRITIVAS PARA PRODUÇÃO
# 
# ATENÇÃO: Este profile é ativado com SPRING_PROFILES_ACTIVE=prod
# TODAS as variáveis de ambiente abaixo são OBRIGATÓRIAS em produção
# ===========================================

spring:
  # Database Configuration - PostgreSQL
  datasource:
    url: ${DATABASE_URL:?DATABASE_URL is required in production}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    username: ${DATABASE_USERNAME:?DATABASE_USERNAME is required in production}
    password: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required in production}
  
  # Flyway Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  
  # JPA/Hibernate
  jpa:
    database-platform: ${DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      # 'validate' previne alterações automáticas no schema em produção
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
  
  # H2 Console - DESABILITADO EM PRODUÇÃO
  h2:
    console:
      enabled: false

# JWT - OBRIGATÓRIO CONFIGURAR VIA ENVIRONMENT
# A aplicação NÃO INICIA sem JWT_SECRET configurado
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET is required in production. Must be at least 32 characters.}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

# CORS - RESTRITO EM PRODUÇÃO
# Obrigatório especificar origens específicas
# Wildcard (*) NÃO É PERMITIDO em produção
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in production. No wildcards allowed.}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

# SENHAS DOS USUÁRIOS - OBRIGATÓRIO ALTERAR
admin:
  default:
    password: ${ADMIN_DEFAULT_PASSWORD:?ADMIN_DEFAULT_PASSWORD is required in production}

user:
  default:
    password: ${USER_DEFAULT_PASSWORD:}

# LOGGING - MAIS RESTRITIVO EM PRODUÇÃO
# Evitar logs DEBUG que podem expor informações sensíveis
logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.hrms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}

# RATE LIMITING - MAIS RESTRITIVO EM PRODUÇÃO
login:
  rate-limit:
    max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:3}
    window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
